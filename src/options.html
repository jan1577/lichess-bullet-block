<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" integrity="sha384-gfdkjb5BdAXd+lj+gudLWI+BXq4IuLW5IT+brZEZsLFm++aCMlF1V92rMkPaX4PP" crossorigin="anonymous">
    <title>Options</title>
</head>

<body>
    <div id="content">
        <!-- Top bar with branding & icon links -->
        <div class="top-bar">
            <div class="brand">
                <img src="icons/48.png" alt="LBB">
                Lichess Bullet Block
            </div>
            <div class="top-bar-links">
                <a target="_blank" title="Source Code" href="__URL_GITHUB__"><i class="fab fa-github"></i></a>
                <a target="_blank" title="Report a Bug" href="__URL_GITHUB__/issues"><i class="fas fa-bug"></i></a>
                <a target="_blank" title="Suggest a Feature" href="__URL_GITHUB__/issues"><i class="fas fa-lightbulb"></i></a>
                <a target="_blank" title="Leave a Review" href="__URL_STORE__"><i class="fas fa-star"></i></a>
            </div>
        </div>

        <!-- Blitz blocking -->
        <div class="section">
            <div class="section-title">Block Blitz Games</div>
            <div class="radio-group">
                <label for="block-blitz">
                    <input type="radio" id="block-blitz" name="blitz-radio" value="yes">
                    Yes
                </label>
                <label for="enable-blitz">
                    <input type="radio" id="enable-blitz" name="blitz-radio" value="no">
                    No
                </label>
                <label for="custom-blitz">
                    <input type="radio" id="custom-blitz" name="blitz-radio" value="custom">
                    Custom Rule
                </label>
            </div>

            <div id="custom-rules-container" style="display: none;">
                <h3>Custom Blitz Rule</h3>
                <p>Allow games where:</p>
                <div class="slider-row">
                    <label for="custom-minutes">Minutes &ge;</label>
                    <input type="range" id="custom-minutes" name="custom-minutes" min="3" max="15" value="3">
                    <span class="slider-value" id="minutes-val">3</span>
                </div>
                <div class="operator-row">
                    <select id="custom-operator">
                        <option value="AND" selected>AND</option>
                        <option value="OR">OR</option>
                    </select>
                </div>
                <div class="slider-row">
                    <label for="custom-increment">Increment &ge;</label>
                    <input type="range" id="custom-increment" name="custom-increment" min="0" max="20" value="0">
                    <span class="slider-value" id="increment-val">0</span>
                    <span style="font-size:12px;color:var(--text-muted)">sec</span>
                </div>
            </div>
        </div>

        <!-- Puzzle variants -->
        <div class="section">
            <div class="section-title">Block Puzzle Variants</div>
            <div class="checkbox-group" id="puzzle-variants">
                <label for="block-storm">
                    <input type="checkbox" id="block-storm" name="block-storm">
                    Puzzle Storm
                </label>
                <label for="block-streak">
                    <input type="checkbox" id="block-streak" name="block-streak">
                    Puzzle Streak
                </label>
                <label for="block-racer">
                    <input type="checkbox" id="block-racer" name="block-racer">
                    Puzzle Racer
                </label>
            </div>
        </div>

        <!-- Quotes toggle -->
        <div class="section">
            <div class="section-title">Motivational Quotes</div>
            <div class="radio-group">
                <label for="enable-quotes">
                    <input type="radio" id="enable-quotes" name="enable-quotes" value="yes">
                    Enabled
                </label>
                <label for="disable-quotes">
                    <input type="radio" id="disable-quotes" name="enable-quotes" value="no">
                    Disabled
                </label>
            </div>
        </div>

        <button id="save">Save Settings</button>
        <div id="status"></div>

        <div class="review">
            <p>Enjoying the extension?</p>
            <a target="_blank" href="__URL_STORE__">Leave a Review</a>
        </div>
    </div>
    <script src="services/storageService.js"></script>
    <script src="options.js"></script>
</body>

</html>
