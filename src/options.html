<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.1/css/all.css" integrity="sha384-gfdkjb5BdAXd+lj+gudLWI+BXq4IuLW5IT+brZEZsLFm++aCMlF1V92rMkPaX4PP" crossorigin="anonymous">
    <title>Options</title>
</head>

<body>
    <div id="content">
        <h1>Do you want to block Blitz Games as well?</h1>
        <form action="/action_page.php">
            <input type="radio" id="block-blitz" name="blitz-radio" value="yes">
            <label for="block-blitz">Yes</label><br>
            <input type="radio" id="enable-blitz" name="blitz-radio" value="no">
            <label for="enable-blitz">No</label><br>
            <input type="radio" id="custom-blitz" name="blitz-radio" value="custom">
            <label for="custom-blitz">Custom Rule</label><br>
            
            <div id="custom-rules-container" style="display: none; border: 1px solid #ccc; padding: 10px; margin-top: 10px;">
                <h3>Custom Blitz Rule</h3>
                <p>Allow games where:</p>
                
                <label for="custom-minutes">Minutes >= </label>
                <span id="minutes-val">3</span>
                <input type="range" id="custom-minutes" name="custom-minutes" min="3" max="15" value="3">
                
                <br>
                <select id="custom-operator">
                    <option value="AND" selected>AND</option>
                    <option value="OR">OR</option>
                </select>
                <br>
                
                <label for="custom-increment">Increment >= </label>
                <span id="increment-val">0</span>
                <input type="range" id="custom-increment" name="custom-increment" min="0" max="20" value="0">
                <span>seconds</span>
            </div>
        </form>
        <h1>Select Puzzle Variants you want to block</h1>
        <div id="puzzle-variants">
            <input type="checkbox" id="block-storm" name="block-storm">
            <label for="html">Puzzle Storm</label><br>
            <input type="checkbox" id="block-streak" name="block-streak">
            <label for="css">Puzzle Streak</label><br>
            <input type="checkbox" id="block-racer" name="block-racer">
            <label for="css">Puzzle Racer</label><br>
        </div>
        <h1>Do you want to enable quotes?</h1>
        <form action="/action_page.php">
            <input type="radio" id="enable-quotes" name="enable-quotes" value="yes">
            <label for="html">yes</label><br>
            <input type="radio" id="disable-quotes" name="enable-quotes" value="no">
            <label for="css">no</label><br>
        </form>
        <button id="save">Save</button>
        <!-- Display a message whenever the settings are saved -->
        <div id="status"></div>
        <hr class="solid">
        <div class="review">
            <p>Do you like the extension?</p>
            <a target="blank"
                href="__URL_STORE__">Leave
                a Review!
            </a>
        </div>
        <a target="blank" title="Source Code" href="__URL_GITHUB__"><i
                class="fab fa-github"></i></a>
        <a target="blank" title="Report a bug" href="__URL_GITHUB__/issues"><i
                class="fas fa-bug"></i></a>
    </div>
    <script src="services/storageService.js"></script>
    <script src="options.js"></script>
</body>

</html>
